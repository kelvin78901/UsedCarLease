# Single service on purpose: DuckDB is an embedded single-process store, so the
# crawl scheduler runs inside the API process (ALR_INPROCESS_SCHEDULER=1) rather
# than a second container contending for the file lock.
#
#   docker compose up --build      -> http://localhost:8000
#
# Crawls LIVE by default. The in-process scheduler runs an initial crawl on boot,
# then every ALR_CRAWL_INTERVAL_MIN, and retrains daily.
#
# AUTO-CRAWL RUNS FREE SOURCES ONLY (leasehackr/swapalease/leasetrader/cars).
# Marketcheck is NEVER in the auto-crawl list: its 500-calls/mo Free quota would
# burn out in hours and trip 429s. It is a MANUAL, monthly-budgeted sweep, and its
# swept inventory is preserved by the source-scoped snapshot (see README
# "Marketcheck"). Put your key in .env only for that manual sweep. Offline: set
# ALR_ADAPTERS=seed.

services:
  autoleaserank:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env          # ALR_MARKETCHECK_KEY (gitignored; copy from .env.example)
        required: false
    environment:
      ALR_INPROCESS_SCHEDULER: "1"
      ALR_CRAWL_INTERVAL_MIN: "180"            # every 3h — gentle on the Playwright sites
      # AUTO-CRAWL = FREE SOURCES ONLY. Marketcheck is deliberately ABSENT: it's a
      # MANUAL, monthly-quota sweep; auto-crawling it would burn ~500/mo in hours and
      # trip 429s. Its swept ~3.4k rows are preserved by the source-scoped snapshot
      # when these four refresh. NEVER add marketcheck here.
      ALR_ADAPTERS: "leasehackr,swapalease,leasetrader,cars"
      ALR_CARS_ZIPS: "20001,21201,19103,23220"  # DMV + PA corridor (DC/Baltimore/Philly/Richmond)
      ALR_CARS_PAGES: "3"
      ALR_USE_LTR: "auto"
    volumes:
      - alr-data:/app/data
    restart: unless-stopped

volumes:
  alr-data:
