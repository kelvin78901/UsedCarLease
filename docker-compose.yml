# Single service on purpose: DuckDB is an embedded single-process store, so the
# crawl scheduler runs inside the API process (ALR_INPROCESS_SCHEDULER=1) rather
# than a second container contending for the file lock.
#
#   docker compose up --build      -> http://localhost:8000
#
# Crawls LIVE by default (leasehackr + marketcheck). The scheduler runs an
# initial crawl on boot, then every ALR_CRAWL_INTERVAL_MIN, and retrains daily.
# Put your Marketcheck key in .env (gitignored; see .env.example). Without it,
# marketcheck no-ops and leasehackr still runs. For pure offline, set
# ALR_ADAPTERS=seed.

services:
  autoleaserank:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env          # ALR_MARKETCHECK_KEY (gitignored; copy from .env.example)
        required: false
    environment:
      ALR_INPROCESS_SCHEDULER: "1"
      ALR_CRAWL_INTERVAL_MIN: "180"            # quota-safe cadence
      # Marketcheck Free quota is spent (one-time burn) -> omitted; source-scoped
      # snapshots keep its ~3.3k swept inventory served while these refresh.
      # cars = working free used-car source. swapalease/leasetrader are wired +
      # concurrent but currently emit 0 (reachable, placeholder selectors stale).
      # Restore marketcheck once the monthly quota resets (or on a paid tier).
      ALR_ADAPTERS: "leasehackr,cars,swapalease,leasetrader"
      ALR_CARS_PAGES: "3"
      ALR_MC_MAX_ROWS: "50"                    # quota-safe per crawl (Free = 500 calls/mo)
      ALR_USE_LTR: "auto"
    volumes:
      - alr-data:/app/data
    restart: unless-stopped

volumes:
  alr-data:
