<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoLeaseRank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--ink:#0B0E14;--panel:#141A26;--panel2:#1C2435;--line:#2A3445;
        --hi:#F2F5F9;--mid:#AEB9CA;--dim:#7E8AA0;--amber:#F4B645;--amberHi:#FFD37A;
        --teal:#5BD9CB;--red:#F07A63;--violet:#9C8BF5}
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  body{margin:0;background:var(--ink);color:var(--hi);font-family:'Inter',sans-serif}
  a{color:inherit}
  .fd{font-family:'Space Grotesk','Inter',sans-serif}
  .fm{font-family:'JetBrains Mono',monospace;font-feature-settings:'tnum'}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2A3445;border-radius:4px}
  input[type=range]{accent-color:var(--amber)}
  button{font-family:inherit;cursor:pointer}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .dot{animation:pulse 2s ease-in-out infinite}
  .lnk{color:var(--teal);text-decoration:none}
  .lnk:hover{text-decoration:underline}
  .layout{display:grid;grid-template-columns:236px 1fr 392px}
  /* narrow screens: drop the right (detail/Pareto) column, then stack the rail */
  @media(max-width:1180px){.layout{grid-template-columns:220px 1fr}}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const API = location.origin.includes("file") ? "http://localhost:8000" : "";
const fmt$ = n => "$" + Math.round(n).toLocaleString();
const NOW_YEAR = new Date().getFullYear();
// realistic used-car finance term (mirrors backend used_finance_term): shrinks
// with age so an old car isn't shown a fake 72mo monthly.
const usedTerm = y => { if(!y) return 72; const age=Math.max(0,NOW_YEAR-y);
  return Math.max(24, Math.min(72, 72 - Math.max(0, age-3)*6)); };
const finNote = d => `@7.5%/${usedTerm(d.year)}mo`;
const isUsed = d => !!d && (d.source === "marketcheck" || d.source === "cars");
const SRC = {leasehackr:"#F4B645",marketcheck:"#5BD9CB",swapalease:"#9C8BF5",
             leasetrader:"#9C8BF5",seed:"#AEB9CA"};
const nav = key => { window.location.hash = "#/v/" + encodeURIComponent(key); };

/* ---- model SHAP driver bars: the model's own 'why' ---- */
function Drivers({drivers}){
  if(!drivers || !drivers.length)
    return <div style={{color:"var(--dim)",fontSize:11.5}}>No model loaded — ranked by rules.</div>;
  const max = Math.max(...drivers.map(d=>Math.abs(d[1]))) || 1;
  return <div style={{display:"flex",flexDirection:"column",gap:5}}>
    {drivers.map(([lab,v],i)=>{
      const pos=v>=0, w=Math.max(4,Math.abs(v)/max*100);
      return <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
        <span className="fm" style={{width:96,fontSize:10.5,color:"var(--mid)",textAlign:"right",
          flexShrink:0}}>{lab}</span>
        <div style={{flex:1,height:9,background:"#0E1320",borderRadius:3,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:w+"%",
            background:pos?"var(--amber)":"var(--red)",opacity:.85,borderRadius:3}}/>
        </div>
        <span className="fm" style={{width:42,fontSize:10,color:pos?"var(--amberHi)":"var(--red)"}}>
          {pos?"+":""}{v.toFixed(2)}</span>
      </div>;
    })}
  </div>;
}

function Scatter({deals,selected}){
  const W=360,H=190,pad={l:40,r:12,t:12,b:28};
  deals=(deals||[]).filter(d=>d.hp>0);   // hp=0 = missing power, not 0 — don't plot/skew
  if(!deals.length) return <div style={{color:"var(--dim)",fontSize:12,padding:20}}>No power data to plot (hp missing).</div>;
  const xs=deals.map(d=>d.effective_monthly), ys=deals.map(d=>d.hp);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const xr=(xmax-xmin)||1, yr=(ymax-ymin)||1;
  const X=v=>pad.l+(v-xmin)/xr*(W-pad.l-pad.r);
  const Y=v=>H-pad.b-(v-ymin)/yr*(H-pad.t-pad.b);
  const front=deals.filter(d=>d.on_frontier).sort((a,b)=>a.effective_monthly-b.effective_monthly);
  const dom=deals.filter(d=>!d.on_frontier);
  const yt=[ymin,(ymin+ymax)/2,ymax], xt=[xmin,(xmin+xmax)/2,xmax];
  return <svg viewBox={`0 0 ${W} ${H}`} width="100%" height="100%" style={{display:"block"}}>
    {yt.map((t,i)=><g key={"y"+i}>
      <line x1={pad.l} x2={W-pad.r} y1={Y(t)} y2={Y(t)} stroke="#2A3445" strokeDasharray="2 4"/>
      <text x={pad.l-6} y={Y(t)+3} fill="#9CA8BC" fontSize="9" textAnchor="end" className="fm">{Math.round(t)}</text>
    </g>)}
    {xt.map((t,i)=><text key={"x"+i} x={X(t)} y={H-9} fill="#9CA8BC" fontSize="9" textAnchor="middle" className="fm">${Math.round(t)}</text>)}
    <text x={pad.l} y={H-1} fill="#9CA8BC" fontSize="8.5" className="fm">effective $/mo  →  power (hp) ↑</text>
    {front.length>1 && <polyline fill="none" stroke="#F4B645" strokeWidth="1"
      points={front.map(d=>`${X(d.effective_monthly)},${Y(d.hp)}`).join(" ")}/>}
    {dom.map((d,i)=><circle key={"d"+i} cx={X(d.effective_monthly)} cy={Y(d.hp)} r="3" fill="#8090A6" fillOpacity="0.7"/>)}
    {front.map((d,i)=><circle key={"f"+i} cx={X(d.effective_monthly)} cy={Y(d.hp)} r="3.6" fill="#F4B645"/>)}
    {selected && <rect x={X(selected.effective_monthly)-4} y={Y(selected.hp)-4} width="8" height="8"
      fill="#5BD9CB" transform={`rotate(45 ${X(selected.effective_monthly)} ${Y(selected.hp)})`}/>}
  </svg>;
}

function _CBRow({t,v}){
  return <div className="fm" style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}>
    <span style={{color:"var(--mid)"}}>{t}</span><span style={{color:"var(--hi)"}}>{v}</span></div>;
}
function CostBreakdown({d}){
  if(isUsed(d)){
    // used-car purchase: price-first, no lease ÷term / seller-incentive wording
    return <div>
      <_CBRow t="Sale price" v={d.price>0?fmt$(d.price):"—"}/>
      {d.msrp>0 && <_CBRow t="MSRP" v={fmt$(d.msrp)}/>}
      {d.msrp>0 && d.msrp_discount_pct>0 && <_CBRow t="Off MSRP" v={d.msrp_discount_pct+"%"}/>}
      <_CBRow t="Odometer" v={d.odometer>0?d.odometer.toLocaleString()+" mi":"—"}/>
      <div className="fm" style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--line)",
        marginTop:6,paddingTop:6,fontSize:15,fontWeight:600}}>
        <span>Est. finance $/mo</span><span style={{color:"var(--amber)"}}>{fmt$(d.effective_monthly)}</span></div>
      <div style={{color:"var(--dim)",fontSize:10,marginTop:4}}>* est. finance pmt @7.5% APR / {usedTerm(d.year)}mo</div>
    </div>;
  }
  const rows=[["Base monthly",d.monthly,false],
    ["One-time fees ÷term",(d.drive_off+d.transfer_fee+d.acquisition_fee+d.disposition_fee)/d.months_remaining,true],
    ["Seller incentive ÷term",-d.seller_incentive/d.months_remaining,true]];
  return <div>
    {rows.map(([t,v],i)=><div key={i} className="fm" style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0"}}>
      <span style={{color:"var(--mid)"}}>{t}</span>
      <span style={{color:v<0?"var(--teal)":"var(--hi)"}}>{v<0?"−":"+"}{fmt$(Math.abs(v))}{String(t).includes("term")?"/mo":""}</span></div>)}
    <div className="fm" style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--line)",
      marginTop:6,paddingTop:6,fontSize:15,fontWeight:600}}>
      <span>Effective $/mo</span><span style={{color:"var(--amber)"}}>{fmt$(d.effective_monthly)}</span></div>
  </div>;
}

function ExternalLink({url,label}){
  if(!url) return null;
  return <a className="lnk fm" href={url} target="_blank" rel="noopener noreferrer"
    onClick={e=>e.stopPropagation()} style={{fontSize:11.5}}>{label||"View original listing"} ↗</a>;
}

/* ===================== full vehicle sub-page ===================== */
function VehiclePage({routeKey}){
  const [d,setD]=useState(null); const [err,setErr]=useState(null);
  useEffect(()=>{
    fetch(API+"/listing/"+encodeURIComponent(routeKey)).then(r=>{
      if(!r.ok) throw new Error(r.status); return r.json();
    }).then(setD).catch(()=>setErr("Listing not found (it may have rotated out of the latest crawl)."));
  },[routeKey]);

  return <div style={{maxWidth:880,margin:"0 auto",padding:"20px 24px"}}>
    <a className="lnk" href="#/" style={{fontSize:13}}>← back to rankings</a>
    {err && <div style={{color:"var(--red)",marginTop:20}}>{err}</div>}
    {d && <div style={{marginTop:16}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:260}}>
          <div className="fd" style={{fontSize:26,fontWeight:700}}>{d.year>0?d.year+" ":""}{d.make} {d.model}
            {d.cpo && <span className="fm" style={{fontSize:11,fontWeight:600,color:"var(--teal)",
              border:"1px solid #5BD9CB55",borderRadius:5,padding:"2px 7px",marginLeft:10,verticalAlign:"middle"}}>CPO</span>}</div>
          <div className="fm" style={{color:"var(--mid)",fontSize:13,marginTop:4}}>
            <span style={{color:SRC[d.source]||"var(--mid)"}}>{d.source}</span> · {d.dealer_city?d.dealer_city+", ":""}{d.state} ·
            {" "}{d.hp}hp · {isUsed(d)
              ? <>{d.price>0?fmt$(d.price)+" sale":""} · est. {fmt$(d.effective_monthly)}/mo {finNote(d)} · {d.odometer>0?d.odometer.toLocaleString()+" mi":"mileage n/a"}</>
              : <>{fmt$(d.msrp)} MSRP · {d.msrp_discount_pct}% off</>} · #{d.rank}</div>
          <div style={{marginTop:8}}><ExternalLink url={d.url}/></div>
        </div>
        <div style={{textAlign:"center"}}>
          <div className="fm" style={{fontSize:46,fontWeight:600,color:"var(--amber)",lineHeight:1}}>
            {Math.round(d.personalized_score)}</div>
          <div style={{fontSize:10,color:"var(--dim)",letterSpacing:".08em"}}>
            {d.scorer==="ltr"?"LAMBDAMART SCORE":"RULES SCORE"}</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:22}}>
        <Card title={isUsed(d)?"Sale & finance":"Effective cost build-up"}><CostBreakdown d={d}/></Card>
        <Card title={d.scorer==="ltr"?"Why the model ranked it here":"Why it ranks here"}>
          <Drivers drivers={d.score_drivers}/>
          <div style={{color:"var(--mid)",fontSize:11.5,lineHeight:1.5,marginTop:10,
            borderTop:"1px solid var(--line)",paddingTop:8}}>{d.explanation}</div>
        </Card>
      </div>

      <Card title="Listing detail" style={{marginTop:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px 18px"}} className="fm">
          {(isUsed(d)
            ? [["Sale price",d.price>0?fmt$(d.price):"—"],["Est. finance $/mo",fmt$(d.effective_monthly)+" "+finNote(d)],
               ["Odometer",d.odometer>0?d.odometer.toLocaleString()+" mi":"—"],["Dealer",d.dealer_city?d.dealer_city+", "+d.state:d.state],
               ["Days on market",d.days_on_market],["Certified (CPO)",d.cpo?"yes":"no"],
               ["MSRP",d.msrp>0?fmt$(d.msrp):"—"],["Body",d.body],["AWD",d.awd?"yes":"no"]]
            : [["Effective $/mo",fmt$(d.effective_monthly)],["Monthly",fmt$(d.monthly)],
               ["MSRP",fmt$(d.msrp)],["Term left",d.months_remaining+" mo"],
               ["Miles left",d.remaining_miles.toLocaleString()],["Miles/mo",d.miles_per_month],
               ["Drive-off",fmt$(d.drive_off)],["Transfer fee",fmt$(d.transfer_fee)],
               ["Seller incentive",fmt$(d.seller_incentive)],["Days on market",d.days_on_market],
               ["vs-market edge",Math.round(d.value_edge*100)+"%"],["On frontier",d.on_frontier?"yes":"no"],
               ["Body",d.body],["AWD",d.awd?"yes":"no"],["State",d.state]]).map(([k,v],i)=>
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,
              borderBottom:"1px solid #1A2230",padding:"4px 0"}}>
              <span style={{color:"var(--dim)"}}>{k}</span><span>{v}</span></div>)}
        </div>
      </Card>
    </div>}
  </div>;
}
function Card({title,children,style}){
  return <div style={{background:"var(--panel)",border:"1px solid var(--line)",borderRadius:12,padding:15,...style}}>
    <div className="fd" style={{fontWeight:600,fontSize:12,color:"var(--mid)",marginBottom:10}}>{title}</div>
    {children}</div>;
}

/* ===================== dashboard ===================== */
function Pulse({label,value,accent}){
  return <div style={{display:"flex",flexDirection:"column",lineHeight:1.1}}>
    <span style={{color:"var(--dim)",fontSize:9,letterSpacing:".08em"}}>{label}</span>
    <span style={{color:accent||"var(--hi)",fontWeight:600}}>{value}</span></div>;
}
function Chip({on,onClick,children,sm}){
  return <button onClick={onClick} className="fm" style={{fontSize:sm?11:12,
    padding:sm?"3px 8px":"5px 11px",borderRadius:7,border:"1px solid "+(on?"var(--amber)":"var(--line)"),
    color:on?"var(--ink)":"var(--mid)",background:on?"var(--amber)":"transparent",fontWeight:on?600:400}}>
    {children}</button>;
}
function Label2({t,r,on,clear}){   // section label + current value (+ clear when active)
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:14}}>
    <span style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em"}}>{t}</span>
    <span className="fm" style={{fontSize:10.5,color:on?"var(--amber)":"var(--dim)",cursor:on?"pointer":"default"}}
      onClick={on?clear:undefined}>{r}{on?"  ✕":""}</span></div>;
}
function Stage({i,t,n,col}){
  return <div style={{flex:1,background:"var(--panel)",border:"1px solid var(--line)",borderRadius:9,padding:"9px 12px"}}>
    <div style={{color:"var(--dim)",fontSize:9.5,letterSpacing:".06em"}} className="fm">{"S"+i+" · "+t}</div>
    <div className="fm" style={{color:col,fontSize:20,fontWeight:600,marginTop:1}}>{n}</div></div>;
}

function Dashboard(){
  const [budget,setBudget]=useState(900);
  const [bodies,setBodies]=useState(null);   // null until /stats tells us the real types
  const [tab,setTab]=useState("all");        // all | lease | used
  const [cpoOnly,setCpo]=useState(false);
  const [wantAwd,setAwd]=useState(false);
  const [wantLux,setLux]=useState(false);
  const [prefStates,setStates]=useState({});
  const [sort,setSort]=useState("score");
  const [q,setQ]=useState("");                 // B1 free-text search
  const [makes,setMakes]=useState({});         // B2 make multi-select
  const [yearMin,setYearMin]=useState(0);
  const [odoMax,setOdoMax]=useState(0);
  const [priceMax,setPriceMax]=useState(0);
  const [awdOnly,setAwdOnly]=useState(false);
  const [moreBody,setMoreBody]=useState(false); // B3 body-chip collapse
  const [data,setData]=useState({deals:[],counts:{}});
  const [stats,setStats]=useState({});
  const [sel,setSel]=useState(null);
  const [err,setErr]=useState(null);

  useEffect(()=>{fetch(API+"/stats").then(r=>r.json()).then(s=>{
    setStats(s);
    // seed the body filter from the REAL types in the data, all selected by default
    setBodies(prev=>prev||Object.fromEntries(Object.keys(s.by_body||{}).map(k=>[k,true])));
  }).catch(()=>{});},[]);
  useEffect(()=>{
    const keys=bodies?Object.keys(bodies):[];
    const selB=keys.filter(k=>bodies[k]);
    // send a body filter only for a proper subset; all (or none) selected => empty => no filter
    const b=(keys.length && selB.length>0 && selB.length<keys.length)?encodeURIComponent(selB.join(",")):"";
    const ps=Object.keys(prefStates).filter(k=>prefStates[k]).join(",");  // hard state filter
    const mk=Object.keys(makes).filter(k=>makes[k]).join(",");
    const cpo=(tab==="used"&&cpoOnly);
    // year/mileage/price filters are used-car concepts -> only sent on the Used tab
    const usedF=(tab==="used")?`&year_min=${yearMin}&odo_max=${odoMax}&price_max=${priceMax}`:"";
    const qs=`budget=${budget}&bodies=${b}&listing_type=${tab}&cpo_only=${cpo}`
          +`&want_awd=${wantAwd}&want_lux=${wantLux}&awd_only=${awdOnly}&states=${ps}`
          +`&makes=${encodeURIComponent(mk)}&q=${encodeURIComponent(q)}&sort=${sort}${usedF}`
          +`${sort==="distance"&&ps?"&near="+ps.split(",")[0]:""}&top_k=100`;
    const t=setTimeout(()=>{
      fetch(API+"/top_deals?"+qs).then(r=>r.json()).then(d=>{setData(d);setErr(null);})
        .catch(()=>setErr("API not reachable. Start it: uvicorn alr.api.main:app"));
    },250);   // debounce so typing in search doesn't fire a request per keystroke
    return ()=>clearTimeout(t);
  },[budget,bodies,tab,cpoOnly,wantAwd,wantLux,awdOnly,prefStates,makes,q,yearMin,odoMax,priceMax,sort]);

  const deals=data.deals||[];
  const selected = sel ? deals.find(d=>d.listing_key===sel)||deals[0] : deals[0];
  const c=data.counts||{};

  return <div>
    <div style={{position:"sticky",top:0,zIndex:9,borderBottom:"1px solid var(--line)",background:"var(--ink)",
      padding:"12px 20px",display:"flex",alignItems:"center",gap:24,flexWrap:"wrap"}}>
      <span className="fd" style={{fontWeight:700,fontSize:17,letterSpacing:"-.02em"}}>
        AutoLease<span style={{color:"var(--amber)"}}>Rank</span></span>
      <span className="fm" style={{color:"var(--dim)",fontSize:10,border:"1px solid var(--line)",padding:"1px 6px",borderRadius:4}}>
        {stats.ranker==="ltr"?"LambdaMART · model-scored":"rules"}&nbsp;·&nbsp;live</span>
      <div style={{display:"flex",gap:4}}>
        {[["all","All",stats.active],["lease","Leases",stats.by_type&&stats.by_type.lease],
          ["used","Used cars",stats.by_type&&stats.by_type.used]].map(([k,label,n])=>
          <button key={k} onClick={()=>setTab(k)} className="fm" style={{fontSize:12,padding:"5px 12px",
            borderRadius:8,border:"1px solid "+(tab===k?"var(--amber)":"var(--line)"),
            background:tab===k?"var(--amber)":"transparent",color:tab===k?"var(--ink)":"var(--mid)",
            fontWeight:tab===k?600:400}}>{label}{n!=null?` · ${n}`:""}</button>)}
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:20}} className="fm">
        <Pulse label="ACTIVE" value={stats.active??"—"}/>
        <Pulse label="MEDIAN $/MO" value={stats.median_effective?fmt$(stats.median_effective):"—"}/>
        <Pulse label="ON FRONTIER" value={c.frontier??"—"} accent="var(--amber)"/>
        <div style={{display:"flex",alignItems:"center",gap:6,color:"var(--mid)",fontSize:11.5}}>
          <span className="dot" style={{width:6,height:6,borderRadius:9,background:"var(--teal)"}}></span>crawl · 30m</div>
      </div>
    </div>

    <div className="layout">
      <div style={{borderRight:"1px solid var(--line)",padding:16,minHeight:"calc(100vh - 53px)"}}>
        <div className="fd" style={{fontWeight:600,fontSize:12,marginBottom:4}}>Re-rank for me</div>
        <div style={{color:"var(--dim)",fontSize:11,marginBottom:16}}>Every change recomputes the pipeline server-side.</div>
        <div style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em"}}>Max effective $/mo</div>
        <div className="fm" style={{color:"var(--amber)",fontSize:22,fontWeight:600}}>{fmt$(budget)}</div>
        <input type="range" min="350" max="1400" step="25" value={budget}
          onChange={e=>setBudget(+e.target.value)} style={{width:"100%",marginTop:6}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:18}}>
          <span style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em"}}>Body type</span>
          <span className="lnk fm" style={{fontSize:10,cursor:"pointer"}}
            onClick={()=>setBodies(s=>Object.fromEntries(Object.keys(s||{}).map(k=>[k,true])))}>all</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
          {(()=>{ const bk=Object.keys(stats.by_body||{}).sort((a,b)=>stats.by_body[b]-stats.by_body[a]);
            if(!bk.length) return <span style={{color:"var(--dim)",fontSize:11}}>loading…</span>;
            const shown=moreBody?bk:bk.slice(0,6);
            return <>{shown.map(b=>
              <Chip key={b} sm on={!!(bodies&&bodies[b])} onClick={()=>setBodies(s=>({...s,[b]:!(s&&s[b])}))}>
                {b} <span style={{opacity:.55}}>{stats.by_body[b]}</span></Chip>)}
              {bk.length>6 && <Chip sm on={false} onClick={()=>setMoreBody(v=>!v)}>
                {moreBody?"− less":`+${bk.length-6} more`}</Chip>}</>;
          })()}
        </div>
        {tab==="used" && <>
          <Label2 t="Year" r={yearMin?`≥ ${yearMin}`:"any"} on={!!yearMin} clear={()=>setYearMin(0)}/>
          <input type="range" min={(stats.year_range||[2000])[0]} max={(stats.year_range||[0,2025])[1]} step="1"
            value={yearMin||(stats.year_range||[2000])[0]} onChange={e=>setYearMin(+e.target.value)} style={{width:"100%"}}/>
          <Label2 t="Max mileage" r={odoMax?`≤ ${(odoMax/1000)}k mi`:"any"} on={!!odoMax} clear={()=>setOdoMax(0)}/>
          <input type="range" min="0" max="150000" step="5000"
            value={odoMax} onChange={e=>setOdoMax(+e.target.value)} style={{width:"100%"}}/>
          <Label2 t="Max price" r={priceMax?fmt$(priceMax):"any"} on={!!priceMax} clear={()=>setPriceMax(0)}/>
          <input type="range" min="0" max="120000" step="2500"
            value={priceMax} onChange={e=>setPriceMax(+e.target.value)} style={{width:"100%"}}/>
          <div style={{display:"flex",gap:6,marginTop:10}}>
            <Chip on={cpoOnly} onClick={()=>setCpo(v=>!v)}>CPO only{stats.used_cpo!=null?` · ${stats.used_cpo}`:""}</Chip>
            <Chip on={awdOnly} onClick={()=>setAwdOnly(v=>!v)}>AWD only</Chip>
          </div>
        </>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:18}}>
          <span style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em"}}>Make</span>
          {Object.values(makes).some(Boolean) && <span className="lnk fm" style={{fontSize:10,cursor:"pointer"}}
            onClick={()=>setMakes({})}>clear</span>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
          {(()=>{ const mk=Object.keys(stats.by_make||{}); const shown=moreBody?mk:mk.slice(0,10);
            return <>{shown.map(m=>
              <Chip key={m} sm on={!!makes[m]} onClick={()=>setMakes(p=>({...p,[m]:!p[m]}))}>{m}</Chip>)}
              {mk.length>10 && <Chip sm on={false} onClick={()=>setMoreBody(v=>!v)}>{moreBody?"− less":`+${mk.length-10}`}</Chip>}</>;
          })()}
        </div>
        <div style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",marginTop:18,letterSpacing:".04em"}}>Boost (personalization)</div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <Chip on={wantAwd} onClick={()=>setAwd(v=>!v)}>AWD +7</Chip>
          <Chip on={wantLux} onClick={()=>setLux(v=>!v)}>Luxury +6</Chip>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginTop:18}}>
          <span style={{color:"var(--mid)",fontSize:10.5,textTransform:"uppercase",letterSpacing:".04em"}}>States · show only</span>
          <span>
            <span className="lnk fm" style={{fontSize:10,cursor:"pointer",marginRight:8}}
              onClick={()=>setStates(p=>({...p,DC:true,MD:true,VA:true}))}>DMV</span>
            {Object.values(prefStates).some(Boolean) && <span className="lnk fm" style={{fontSize:10,cursor:"pointer"}}
              onClick={()=>setStates({})}>clear</span>}
          </span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
          {(()=>{ const sk=Object.keys(stats.by_state||{});  // dynamic: real dealer states, count-desc
            if(!sk.length) return <span style={{color:"var(--dim)",fontSize:11}}>loading…</span>;
            const shown=moreBody?sk:sk.slice(0,14);
            return <>{shown.map(s=>
              <Chip key={s} sm on={!!prefStates[s]} onClick={()=>setStates(p=>({...p,[s]:!p[s]}))}>
                {s} <span style={{opacity:.55}}>{stats.by_state[s]}</span></Chip>)}
              {sk.length>14 && <Chip sm on={false} onClick={()=>setMoreBody(v=>!v)}>{moreBody?"− less":`+${sk.length-14}`}</Chip>}</>;
          })()}
        </div>
      </div>

      <div style={{padding:16,minWidth:0}}>
        <div style={{display:"flex",gap:8}}>
          <Stage i={1} t="CRAWLED" n={c.crawled??"—"} col="var(--mid)"/>
          <div style={{alignSelf:"center",color:"var(--dim)"}}>›</div>
          <Stage i={2} t="FILTERED" n={c.filtered??"—"} col="var(--teal)"/>
          <div style={{alignSelf:"center",color:"var(--dim)"}}>›</div>
          <Stage i={3} t="FRONTIER" n={c.frontier??"—"} col="var(--amber)"/>
          <div style={{alignSelf:"center",color:"var(--dim)"}}>›</div>
          <Stage i={4} t="MODEL-RANKED" n={c.ranked??"—"} col="var(--amberHi)"/>
        </div>
        {err && <div style={{color:"var(--red)",fontSize:12,marginTop:14,border:"1px dashed var(--line)",
          borderRadius:8,padding:12}}>{err}</div>}
        <div style={{display:"flex",gap:8,alignItems:"center",marginTop:14}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search make / model / trim — e.g. mach-e, denali, awd"
            className="fm" style={{flex:1,minWidth:0,background:"var(--panel)",color:"var(--hi)",
            border:"1px solid var(--line)",borderRadius:8,fontSize:12.5,padding:"8px 11px"}}/>
          {q && <span className="lnk fm" style={{fontSize:11,cursor:"pointer"}} onClick={()=>setQ("")}>clear</span>}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",margin:"12px 4px 8px"}}>
          <div className="fd" style={{fontWeight:600,fontSize:14}}>Ranked deals
            <span style={{color:"var(--dim)",fontWeight:400}}> · {deals.length}</span></div>
          <select value={sort} onChange={e=>setSort(e.target.value)} className="fm" style={{background:"var(--panel)",
            color:"var(--mid)",border:"1px solid var(--line)",borderRadius:7,fontSize:11,padding:"4px 8px"}}>
            <option value="score">Best match</option>
            <option value="price_asc">Price ↑</option>
            <option value="price_desc">Price ↓</option>
            <option value="newest">Newest (days on mkt)</option>
            {Object.values(prefStates).some(Boolean) && <option value="distance">Nearest (state)</option>}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {deals.map(d=>{
            const active=selected&&selected.listing_key===d.listing_key;
            const edge=Math.round(d.value_edge*100);
            const sc=d.personalized_score;
            const col=sc>=80?"var(--amber)":sc>=62?"var(--amberHi)":sc>=45?"var(--teal)":"var(--mid)";
            return <div key={d.listing_key} role="button" tabIndex={0} onClick={()=>setSel(d.listing_key)}
              style={{textAlign:"left",cursor:"pointer",
              background:active?"var(--panel2)":"var(--panel)",border:"1px solid "+(active?"var(--amber)":"var(--line)"),
              borderRadius:11,padding:"11px 13px",display:"flex",alignItems:"center",gap:13}}>
              <span className="fm" style={{color:"var(--dim)",fontSize:12,width:22}}>{d.rank}</span>
              <div style={{width:50,textAlign:"center"}}>
                <div className="fm" style={{fontSize:23,fontWeight:600,color:col,lineHeight:1}}>{Math.round(sc)}</div>
                <div style={{fontSize:8.5,color:"var(--dim)"}}>{d.scorer==="ltr"?"ML":"SCORE"}</div></div>
              <div style={{minWidth:0,flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span className="fd" style={{fontWeight:600,fontSize:13.5}}>{d.year>0?d.year+" ":""}{d.make} {d.model}</span>
                  {d.cpo && <span className="fm" style={{fontSize:9,fontWeight:600,color:"var(--teal)",
                    border:"1px solid #5BD9CB55",borderRadius:5,padding:"1px 5px"}}>CPO</span>}
                  {d.on_frontier && <span className="fm" style={{fontSize:9,fontWeight:600,color:"var(--amber)",
                    border:"1px solid #F4B64555",borderRadius:5,padding:"1px 5px"}}>FRONTIER</span>}
                  {d.seller_incentive>0 && <span className="fm" style={{fontSize:9,fontWeight:600,color:"var(--teal)",
                    border:"1px solid #5BD9CB55",borderRadius:5,padding:"1px 5px"}}>+{fmt$(d.seller_incentive)}</span>}
                </div>
                <div className="fm" style={{display:"flex",gap:12,marginTop:4,color:"var(--mid)",fontSize:11}}>
                  <span style={{color:SRC[d.source]||"var(--mid)"}}>{d.source}</span>
                  <span>{d.state}</span><span>{d.hp}hp</span>
                  {isUsed(d)
                    ? <span>{d.odometer>0?d.odometer.toLocaleString()+"mi":"—"}{d.dealer_city?" · "+d.dealer_city:""}{d.days_on_market>0?" · "+d.days_on_market+"d on mkt":""}</span>
                    : <span>{d.months_remaining}mo · {d.remaining_miles.toLocaleString()}mi</span>}</div>
              </div>
              {isUsed(d)
                ? (d.price>0
                  ? <div style={{textAlign:"right"}}>
                      <div className="fm" style={{fontSize:18,fontWeight:600}}>{fmt$(d.price)}</div>
                      <div className="fm" style={{fontSize:10.5,color:"var(--dim)"}}>sale price</div>
                      <div className="fm" style={{fontSize:10.5,color:"var(--mid)",marginTop:2}}>
                        est. {fmt$(d.effective_monthly)}/mo</div></div>
                  : <div style={{textAlign:"right"}}>
                      <div className="fm" style={{fontSize:18,fontWeight:600}}>{fmt$(d.effective_monthly)}</div>
                      <div className="fm" style={{fontSize:10.5,color:"var(--dim)"}}>est. $/mo</div>
                      <div className="fm" style={{fontSize:10,color:"var(--dim)",marginTop:2}}>finance {finNote(d)}</div></div>)
                : <div style={{textAlign:"right"}}>
                    <div className="fm" style={{fontSize:18,fontWeight:600}}>{fmt$(d.effective_monthly)}</div>
                    <div className="fm" style={{fontSize:10.5,color:"var(--dim)"}}>eff/mo</div>
                    <div className="fm" style={{fontSize:11,color:edge>=0?"var(--teal)":"var(--red)",marginTop:2}}>
                      {edge>=0?"▼":"▲"}{Math.abs(edge)}% vs mkt</div></div>}
              <div style={{display:"flex",flexDirection:"column",gap:6,paddingLeft:8,borderLeft:"1px solid var(--line)"}}>
                <a className="lnk" href={d.url||"#"} target="_blank" rel="noopener noreferrer"
                  onClick={e=>e.stopPropagation()} title="open original listing"
                  style={{fontSize:14,textAlign:"center"}}>↗</a>
                <span onClick={e=>{e.stopPropagation();nav(d.listing_key);}} title="full detail page"
                  style={{fontSize:13,textAlign:"center",color:"var(--mid)",cursor:"pointer"}}>⤢</span>
              </div>
            </div>;
          })}
          {deals.length===0 && !err && <div style={{color:"var(--mid)",border:"1px dashed var(--line)",
            borderRadius:10,padding:30,textAlign:"center"}}>No deals clear the filters. Raise the budget.</div>}
        </div>
      </div>

      <div style={{borderLeft:"1px solid var(--line)",padding:16}}>
        {selected && <div style={{background:"var(--panel)",border:"1px solid #F4B64555",borderRadius:12,padding:15}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div className="fd" style={{fontWeight:700,fontSize:16}}>{selected.year>0?selected.year+" ":""}{selected.make} {selected.model}</div>
            <span onClick={()=>nav(selected.listing_key)} className="lnk" style={{fontSize:11.5,cursor:"pointer"}}>full page →</span>
          </div>
          <div className="fm" style={{color:"var(--mid)",fontSize:11,marginTop:2}}>
            {isUsed(selected)
              ? <>{selected.cpo?"CPO · ":""}{selected.price>0?fmt$(selected.price)+" · ":""}{selected.odometer>0?selected.odometer.toLocaleString()+" mi · ":""}{selected.hp}hp · est. {fmt$(selected.effective_monthly)}/mo</>
              : <>{fmt$(selected.msrp)} MSRP · {selected.msrp_discount_pct}% off · {selected.hp}hp</>}</div>
          <div style={{marginTop:6}}><ExternalLink url={selected.url}/></div>
          <div style={{borderTop:"1px solid var(--line)",marginTop:10,paddingTop:8}}>
            <CostBreakdown d={selected}/></div>
          <div style={{background:"var(--panel2)",borderRadius:9,padding:"10px 11px",marginTop:11}}>
            <div style={{color:"var(--amberHi)",fontSize:11,fontWeight:600,marginBottom:8}}>
              {selected.scorer==="ltr"?"Model score drivers (SHAP)":"Why it ranks here"}</div>
            <Drivers drivers={selected.score_drivers}/>
            <div style={{color:"var(--mid)",fontSize:11.5,lineHeight:1.5,marginTop:8}}>{selected.explanation}</div></div>
        </div>}

        <div style={{color:"var(--mid)",fontSize:12,fontWeight:600,margin:"22px 0 8px"}} className="fd">Pareto frontier · cost vs power</div>
        <div style={{height:210,background:"var(--panel)",border:"1px solid var(--line)",borderRadius:10,padding:8}}>
          <Scatter deals={deals} selected={selected}/>
        </div>
        <div style={{color:"var(--dim)",fontSize:11,marginTop:8,lineHeight:1.5}}>
          Amber points are non-dominated — no listing beats them on both cost and power. The teal diamond is your selection.</div>
      </div>
    </div>
  </div>;
}

/* ===================== router ===================== */
function App(){
  const [hash,setHash]=useState(window.location.hash);
  useEffect(()=>{
    const f=()=>setHash(window.location.hash);
    window.addEventListener("hashchange",f);
    return ()=>window.removeEventListener("hashchange",f);
  },[]);
  const m=hash.match(/^#\/v\/(.+)$/);
  if(m) return <VehiclePage routeKey={decodeURIComponent(m[1])}/>;
  return <Dashboard/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
